version: '3.8'

services:
  # 1. Contenedor de Base de Datos
  db:
    image: mariadb:10.11
    container_name: ictiomind_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 4p0l0123
      MYSQL_DATABASE: ictiomind_db
      MYSQL_USER: root
    ports:
      - "3306:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - ictiomind_network

  # 2. Contenedor Backend (Python / IA)
  backend:
    build: ./backend
    container_name: ictiomind_backend
    restart: always
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./backend:/app
    networks:
      - ictiomind_network

  # 3. Contenedor Frontend (React)
  frontend:
    build: ./frontend
    container_name: ictiomind_frontend
    restart: always
    ports:
      - "5173:5173"  # Puerto estándar si usamos Vite con React
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
    networks:
      - ictiomind_network

networks:
  ictiomind_network:
    driver: bridge

volumes:
  mariadb_data: